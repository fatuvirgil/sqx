version: '3.8'

services:
  # ============================================
  # PHP Safe Endpoints (Apache + PHP 8.1)
  # ============================================
  php-safe:
    image: php:8.1-apache
    container_name: sqx-fp-php
    ports:
      - "9001:80"
    volumes:
      - ./php-safe:/var/www/html
    environment:
      MYSQL_HOST: mysql-safe
      MYSQL_DB: testdb
      MYSQL_USER: testuser
      MYSQL_PASS: testpass
    command: >
      bash -c "docker-php-ext-install pdo_mysql > /dev/null 2>&1 && 
               docker-php-ext-enable pdo_mysql > /dev/null 2>&1 && 
               apache2-foreground"
    depends_on:
      - mysql-safe
      - postgres-safe

  # ============================================
  # Node.js Safe Endpoints (Express)
  # ============================================
  node-safe:
    image: node:18-alpine
    container_name: sqx-fp-node
    ports:
      - "9002:3000"
    volumes:
      - ./node-safe:/app
    working_dir: /app
    command: sh -c "npm install express mysql2 pg && node server.js"
    depends_on:
      - mysql-safe
      - postgres-safe

  # ============================================
  # Python Safe Endpoints (Flask)
  # ============================================
  python-safe:
    image: python:3.11-alpine
    container_name: sqx-fp-python
    ports:
      - "9003:5000"
    volumes:
      - ./python-safe:/app
    working_dir: /app
    command: sh -c "pip install flask sqlalchemy psycopg2-binary pymysql && python app.py"
    depends_on:
      - mysql-safe
      - postgres-safe

  # ============================================
  # MySQL pentru teste (safe schema)
  # ============================================
  mysql-safe:
    image: mysql:8.0
    container_name: sqx-fp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    volumes:
      - ./init/mysql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  # ============================================
  # PostgreSQL pentru teste (safe schema)
  # ============================================
  postgres-safe:
    image: postgres:15
    container_name: sqx-fp-postgres
    environment:
      POSTGRES_PASSWORD: rootpass
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
    volumes:
      - ./init/postgres:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  # ============================================
  # WAF Protected (ModSecurity + Apache)
  # ============================================
  waf-protected:
    image: owasp/modsecurity-crs:apache
    container_name: sqx-fp-waf
    ports:
      - "9004:80"
    volumes:
      - ./waf-html:/usr/local/apache2/htdocs
    environment:
      - PARANOIA=1

  # ============================================
  # Non-SQL Endpoints (cache, logs, etc.)
  # ============================================
  cache-endpoints:
    image: php:8.1-apache
    container_name: sqx-fp-cache
    ports:
      - "9005:80"
    volumes:
      - ./cache-endpoints:/var/www/html
